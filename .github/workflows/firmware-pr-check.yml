name: Firmware PR Check

on:
  pull_request:
    paths:
      - "firmware/**"
      - ".github/workflows/firmware-pr-check.yml"
  push:
    branches:
      - main
    paths:
      - "firmware/**"
      - ".github/workflows/firmware-pr-check.yml"

jobs:
  build:
    name: Build ESP32-P4 firmware (PR)
    runs-on:
      - self-hosted
      - macOS
      - ARM64
    timeout-minutes: 30
    defaults:
      run:
        shell: zsh -l {0}
        working-directory: firmware
    env:
      EXTRA_CFLAGS: -Werror
      IDF_SKIP_CHECK_SUBMODULES: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show runner context
        run: |
          uname -a
          whoami
          pwd

      - name: Verify ESP-IDF activation script exists
        run: |
          test -f ../scripts/activate-idf-v5.5.4.sh
          test -f "$HOME/.espressif/tools/activate_idf_v5.5.4.sh"

      - name: Build firmware
        run: |
          . ../scripts/activate-idf-v5.5.4.sh
          idf.py set-target esp32p4
          idf.py build
