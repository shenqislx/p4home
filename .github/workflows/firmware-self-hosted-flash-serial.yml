name: Firmware Self-Hosted Flash Serial

on:
  workflow_dispatch:
    inputs:
      serial_port:
        description: macOS serial device path
        required: true
        default: /dev/cu.usbserial-10
      monitor_seconds:
        description: Seconds to capture startup logs
        required: true
        default: "20"

jobs:
  flash-and-monitor:
    name: Flash ESP32-P4 and capture serial logs
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - esp32-p4
    timeout-minutes: 45
    defaults:
      run:
        shell: zsh -l {0}
        working-directory: firmware
    env:
      SERIAL_PORT: ${{ inputs.serial_port }}
      MONITOR_SECONDS: ${{ inputs.monitor_seconds }}
      IDF_SKIP_CHECK_SUBMODULES: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show runner context
        run: |
          uname -a
          whoami
          pwd
          ls "$SERIAL_PORT"

      - name: Verify ESP-IDF activation script exists
        run: |
          test -f ../scripts/activate-idf-v5.5.4.sh
          test -f "$HOME/.espressif/tools/activate_idf_v5.5.4.sh"

      - name: Build firmware
        run: |
          . ../scripts/activate-idf-v5.5.4.sh
          idf.py set-target esp32p4
          idf.py fullclean build

      - name: Flash firmware and capture startup serial logs
        run: |
          . ../scripts/activate-idf-v5.5.4.sh
          python - <<'PY'
          import os
          import pathlib
          import subprocess
          import time

          import serial
          from esp_idf_monitor.base.reset import Reset

          port = os.environ["SERIAL_PORT"]
          timeout_seconds = int(os.environ["MONITOR_SECONDS"])
          log_path = pathlib.Path("monitor.log")
          flash_command = ["idf.py", "-p", port, "flash"]

          with log_path.open("w", encoding="utf-8", errors="replace") as handle:
              handle.write(f"$ {' '.join(flash_command)}\n")
              handle.flush()
              subprocess.run(
                  flash_command,
                  stdout=handle,
                  stderr=subprocess.STDOUT,
                  text=True,
                  check=True,
              )

              handle.write(f"\n$ serial-capture {port} {timeout_seconds}s\n")
              handle.flush()

              ser = serial.Serial()
              ser.port = port
              ser.baudrate = 115200
              ser.timeout = 0.25
              ser.rts = False
              ser.dtr = False
              ser.open()

              try:
                  reset = Reset(ser, "esp32p4")
                  reset._setRTS(False)
                  reset._setDTR(False)
                  ser.reset_input_buffer()
                  reset.hard()

                  deadline = time.monotonic() + timeout_seconds
                  while time.monotonic() < deadline:
                      chunk = ser.read(ser.in_waiting or 1)
                      if not chunk:
                          continue
                      handle.write(chunk.decode("utf-8", errors="replace"))
                      handle.flush()
              finally:
                  ser.close()

          print(f"Saved serial log to {log_path}")
          PY

      - name: Write hardware validation manifest
        run: |
          python3 - <<'PY'
          import json
          import os
          import pathlib

          manifest = {
              "schema_version": 1,
              "mode": "artifact-only",
              "verdict_owner": "cloud-codex",
              "git_sha": os.environ["GITHUB_SHA"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "job": "flash-and-monitor",
              "serial_port": os.environ["SERIAL_PORT"],
              "monitor_seconds": int(os.environ["MONITOR_SECONDS"]),
              "log_file": "monitor.log",
          }

          pathlib.Path("hardware-validation-manifest.json").write_text(
              json.dumps(manifest, ensure_ascii=True, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Assert captured log is non-empty
        run: |
          test -s monitor.log

      - name: Assert all VERIFY markers pass
        run: |
          grep 'VERIFY:' monitor.log
          if grep -q 'VERIFY:.*:FAIL' monitor.log; then
            echo "::error::Hardware verification markers contain FAIL"
            grep 'VERIFY:.*:FAIL' monitor.log
            exit 1
          fi

      - name: Write job summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ESP32-P4 hardware validation artifact

          Build, flash, serial capture, VERIFY line checks, and artifact upload completed.
          Additional review may still use \`monitor.log\` for diagnostics beyond VERIFY markers.

          Files:
          - \`firmware/monitor.log\`
          - \`firmware/hardware-validation-manifest.json\`
          EOF

      - name: Show monitor log tail on failure
        if: failure()
        run: tail -n 200 monitor.log || true

      - name: Upload serial log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: esp32-p4-monitor-log
          path: |
            firmware/monitor.log
            firmware/hardware-validation-manifest.json
          if-no-files-found: error
